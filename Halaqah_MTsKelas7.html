<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Hafalan Qur'an 30 Juz</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 15px;
            max-width: 600px;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 22px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-top: 0; font-size: 13px; margin-bottom: 25px; }
        h3 { color: #2c3e50; font-size: 16px; margin-top: 25px; border-bottom: 2px solid #bdc3c7; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; color: #34495e; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fff;
        }
        .search-box {
            margin-bottom: 8px;
            border: 1px solid #3498db;
            background-color: #f7f9fa;
        }
        .ayat-container {
            background: #fff;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            padding: 15px;
            max-height: 250px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 5px;
        }
        .ayat-item {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #f1f2f6;
            cursor: pointer;
        }
        .ayat-item input { width: auto; margin-right: 8px; cursor: pointer; }
        .ayat-item label { margin: 0; cursor: pointer; font-size: 14px; }
        
        button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }
        .btn-save { background-color: #27ae60; }
        .btn-save:hover { background-color: #219653; }
        .btn-wa { background-color: #2980b9; }
        .btn-wa:hover { background-color: #2471a3; }
        .btn-delete {
            background-color: transparent;
            color: #c0392b;
            border: 1px solid #c0392b;
            font-size: 13px;
            padding: 8px;
            margin-top: 20px;
        }
        .btn-delete:hover { background-color: #fce4e4; }
        
        /* Gaya Tabel Preview */
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #dcdde1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #f1f2f6;
        }
        th {
            background-color: #f4f6f7;
            color: #34495e;
            font-weight: bold;
        }
        .action-btn {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            color: white;
            margin-right: 2px;
            font-weight: bold;
        }
        .btn-edit-row { background-color: #e67e22; }
        .btn-delete-row { background-color: #e74c3c; }

        .status-box {
            background-color: #e8f8f5;
            border-left: 4px solid #2ecc71;
            padding: 12px;
            margin-top: 15px;
            font-size: 13px;
            border-radius: 6px;
        }
        .select-toggle-btn {
            background: #34495e;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            width: auto;
            display: inline-block;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>

        </select>
    </div>

        let statusCentangSemua = false;

        function inisialisasiAplikasi() {
            const selectPengampu = document.getElementById('pengampu');
            for (let ustadz in dataHalaqah) {
                let opt = document.createElement('option');
                opt.value = ustadz;
                opt.innerHTML = ustadz;
                selectPengampu.appendChild(opt);
            }
            muatDaftarSurat();
            perbaruiStatusDanTabel();
        }

        function perbaruiDaftarSantri() {
            const ustadzTerpilih = document.getElementById('pengampu').value;
            const selectSantri = document.getElementById('santri');
            selectSantri.innerHTML = '<option value="">-- Pilih Nama Santri --</option>';
            
            if (ustadzTerpilih && dataHalaqah[ustadzTerpilih]) {
                dataHalaqah[ustadzTerpilih].forEach(santri => {
                    let opt = document.createElement('option');
                    opt.value = santri;
                    opt.innerHTML = santri;
                    selectSantri.appendChild(opt);
                });
            } else {
                selectSantri.innerHTML = '<option value="">-- Pilih Ustadz Terlebih Dahulu --</option>';
            }
        }

        function muatDaftarSurat() {
            const selectSurat = document.getElementById('surat');
            selectSurat.innerHTML = '<option value="">-- Pilih Surat --</option>';
            dataSurat.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.nama;
                opt.setAttribute('data-ayat', s.totalAyat);
                opt.innerHTML = `${s.no}. ${s.nama} (${s.totalAyat} Ayat)`;
                selectSurat.appendChild(opt);
            });
        }

        function filterSurat() {
            let kataKunci = document.getElementById('cariSurat').value.toLowerCase();
            const selectSurat = document.getElementById('surat');
            selectSurat.innerHTML = '<option value="">-- Pilih Surat --</option>';
            
            dataSurat.forEach(s => {
                if(s.nama.toLowerCase().includes(kataKunci) || s.no.toString().includes(kataKunci)) {
                    let opt = document.createElement('option');
                    opt.value = s.nama;
                    opt.setAttribute('data-ayat', s.totalAyat);
                    opt.innerHTML = `${s.no}. ${s.nama} (${s.totalAyat} Ayat)`;
                    selectSurat.appendChild(opt);
                }
            });
        }

        function tampilkanDaftarAyat() {
            let selectSurat = document.getElementById('surat');
            let selectedOpt = selectSurat.options[selectSurat.selectedIndex];
            if(!selectedOpt) return;
            
            let totalAyat = selectedOpt.getAttribute('data-ayat');
            let container = document.getElementById('daftarAyat');
            let areaAyat = document.getElementById('areaAyat');
            
            container.innerHTML = ""; 
            statusCentangSemua = false;
            document.getElementById('btnToggleCentang').innerHTML = "☑️ Centang Semua";
            
            if(!totalAyat) {
                areaAyat.style.display = "none";
                return;
            }
            
            areaAyat.style.display = "block";
            for(let i = 1; i <= totalAyat; i++) {
                container.innerHTML += `
                    <div class="ayat-item">
                        <input type="checkbox" class="chk-ayat" id="ayat_${i}" value="${i}">
                        <label for="ayat_${i}">Ayat ${i}</label>
                    </div>
                `;
            }
        }

        function toggleCentangSemua() {
            let checkboxes = document.querySelectorAll('.chk-ayat');
            let btn = document.getElementById('btnToggleCentang');
            
            if (!statusCentangSemua) {
                checkboxes.forEach(cb => cb.checked = true);
                btn.innerHTML = "⬜ Hapus Semua Centang";
                statusCentangSemua = true;
            } else {
                checkboxes.forEach(cb => cb.checked = false);
                btn.innerHTML = "☑️ Centang Semua";
                statusCentangSemua = false;
            }
        }

        // Memperbarui Kotak Status Sekaligus Merender Tabel Antrean Data
        function perbaruiStatusDanTabel() {
            let daftarSetoran = JSON.parse(localStorage.getItem('quranMonitorLokal')) || [];
            let box = document.getElementById('statusData');
            let tbody = document.getElementById('tabelPreviewBody');
            
            // 1. Update Box Status Green/Orange
            if(daftarSetoran.length > 0) {
                box.innerHTML = `✅ Tersimpan: <b>${daftarSetoran.length} setoran santri</b> siap dipindahkan.`;
                box.style.backgroundColor = "#e8f8f5";
                box.style.borderLeftColor = "#2ecc71";
            } else {
                box.innerHTML = "❌ Belum ada data setoran baru yang tersimpan.";
                box.style.backgroundColor = "#fdf2e9";
                box.style.borderLeftColor = "#e67e22";
            }

            // 2. Render isi tabel antrean
            tbody.innerHTML = "";
            if(daftarSetoran.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#95a5a6;">Belum ada data antrean.</td></tr>`;
                return;
            }

            daftarSetoran.forEach((item, indeks) => {
                // Potong teks ayat jika terlalu panjang di preview tabel agar rapi
                let batasTeksAyat = item.ayat.length > 20 ? item.ayat.substring(0, 20) + "..." : item.ayat;
                
                tbody.innerHTML += `
                    <tr>
                        <td><b>${item.santri}</b><br><small style="color:#7f8c8d;">${item.pengampu}</small></td>
                        <td>${item.surat}<br><span style="color:#2980b9; font-size:11px;">Ayat: ${batasTeksAyat} (${item.totalSetor})</span></td>
                        <td><small>${item.waktu.split(' ')[1] || item.waktu}</small></td>
                        <td>
                            <button class="action-btn btn-edit-row" onclick="editBarisData(${indeks})">✏️</button>
                            <button class="action-btn btn-delete-row" onclick="hapusBarisData(${indeks})">❌</button>
                        </td>
                    </tr>
                `;
            });
        }

        function simpanHafalan() {
            let pengampu = document.getElementById('pengampu').value;
            let santri = document.getElementById('santri').value;
            let surat = document.getElementById('surat').value;

            let checkboxes = document.querySelectorAll('.chk-ayat:checked');
            let ayatTerpilih = [];
            checkboxes.forEach(cb => ayatTerpilih.push(cb.value));

            if(!pengampu || !santri || !surat) {
                return alert("Tolong pilih Pengampu, Santri, dan Surat terlebih dahulu!");
            }
            if(ayatTerpilih.length === 0) {
                return alert("Tolong centang minimal satu ayat yang disetorkan!");
            }

            let listAyatTeks = ayatTerpilih.join("; "); 
            let daftarSetoran = JSON.parse(localStorage.getItem('quranMonitorLokal')) || [];
            
            let sekarang = new Date();
            let waktuInput = sekarang.toLocaleDateString('id-ID') + ' ' + sekarang.toLocaleTimeString('id-ID');
            
            daftarSetoran.push({ 
                pengampu: pengampu, 
                santri: santri, 
                surat: surat, 
                ayat: listAyatTeks,
                totalSetor: ayatTerpilih.length,
                waktu: waktuInput 
            });
            
            localStorage.setItem('quranMonitorLokal', JSON.stringify(daftarSetoran));

            // Reset form input santri & ayat (Ustadz pengampu tetap ter-select biar cepat)
            document.getElementById('santri').value = '';
            document.getElementById('cariSurat').value = '';
            muatDaftarSurat();
            document.getElementById('daftarAyat').innerHTML = '';
            document.getElementById('areaAyat').style.display = 'none';
            
            perbaruiStatusDanTabel();
        }

        // FUNGSI HAPUS SATU BARIS DATA
        function hapusBarisData(indeks) {
            let daftarSetoran = JSON.parse(localStorage.getItem('quranMonitorLokal')) || [];
            if(confirm(`Hapus data rekap setoran untuk santri "${daftarSetoran[indeks].santri}"?`)) {
                daftarSetoran.splice(indeks, 1);
                localStorage.setItem('quranMonitorLokal', JSON.stringify(daftarSetoran));
                perbaruiStatusDanTabel();
            }
        }

        // FUNGSI EDIT SATU BARIS DATA (Tarik ke atas, perbaiki, lalu simpan ulang)
        function editBarisData(indeks) {
            let daftarSetoran = JSON.parse(localStorage.getItem('quranMonitorLokal')) || [];
            let item = daftarSetoran[indeks];

            // 1. Kembalikan data Pengampu & Santri ke Dropdown atas
            document.getElementById('pengampu').value = item.pengampu;
            perbaruiDaftarSantri();
            document.getElementById('santri').value = item.santri;

            // 2. Kembalikan data Surat
            document.getElementById('surat').value = item.surat;
            tampilkanDaftarAyat();

            // 3. Centang kembali ayat-ayat yang sebelumnya sudah dipilih
            let susunanAyat = item.ayat.split("; ");
            susunanAyat.forEach(ayat => {
                let cb = document.getElementById(`ayat_${ayat.trim()}`);
                if(cb) cb.checked = true;
            });

            // 4. Hapus data lama dari antrean (Nanti otomatis tersimpan sebagai data baru pas klik simpan)
            daftarSetoran.splice(indeks, 1);
            localStorage.setItem('quranMonitorLokal', JSON.stringify(daftarSetoran));
            perbaruiStatusDanTabel();

            alert("Data ditarik kembali ke formulir atas. Silakan ubah ayat lalu klik tombol 'Simpan Setoran ke HP' lagi.");
            window.scrollTo({top: 0, behavior: 'smooth'}); // Layar otomatis scroll ke atas di HP
        }

        async function bagikanFileCSV() {
            let daftarSetoran = JSON.parse(localStorage.getItem('quranMonitorLokal')) || [];
            if(daftarSetoran.length === 0) {
                return alert("Belum ada data setoran baru untuk dibagikan!");
            }

            let namaUstadz = daftarSetoran[0].pengampu.replace(/[^a-zA-Z0-9]/g, "_");

            let isiCSV = "Pengampu Halaqah,Nama Santri,Surat,Ayat Hafal,Total Ayat,Tanggal Setoran\n";
            daftarSetoran.forEach(item => {
                isiCSV += `"${item.pengampu}","${item.santri}","${item.surat}","${item.ayat}","${item.totalSetor}","${item.waktu}"\n`;
            });

            let sekarang = new Date();
            let tahun = sekarang.getFullYear();
            let bulan = String(sekarang.getMonth() + 1).padStart(2, '0');
            let tanggal = String(sekarang.getDate()).padStart(2, '0');
            let jam = String(sekarang.getHours()).padStart(2, '0');
            let menit = String(sekarang.getMinutes()).padStart(2, '0');
            let detik = String(sekarang.getSeconds()).padStart(2, '0');

            let namaFileUnik = `setoran_${namaUstadz}_${tahun}-${bulan}-${tanggal}_${jam}-${menit}-${detik}.csv`;

            let blob = new Blob([isiCSV], { type: 'text/csv;charset=utf-8;' });
            let fileMentah = new File([blob], namaFileUnik, { type: 'text/csv' });

            if (navigator.canShare && navigator.canShare({ files: [fileMentah] })) {
                try {
                    await navigator.share({
                        files: [fileMentah],
                        title: 'Setoran Hafalan Qur\'an',
                        text: `File data rekap setoran: ${namaFileUnik}`
                    });
                    localStorage.removeItem('quranMonitorLokal');
                    alert(`File "${namaFileUnik}" sukses dibuat dan dibagikan! Memori lokal HP dibersihkan.`);
                    perbaruiStatusDanTabel();
                } catch (error) {
                    console.log("Sharing dibatalkan:", error);
                }
            } else {
                alert("Browser tidak mendukung share file. Gunakan Google Chrome versi terbaru.");
            }
        }

        function bersihkanSemua() {
            if (confirm("Apakah Anda yakin ingin menghapus paksa seluruh data setoran di HP ini?")) {
                localStorage.removeItem('quranMonitorLokal');
                alert("Memori aplikasi berhasil dikosongkan.");
                perbaruiStatusDanTabel();
            }
        }

        inisialisasiAplikasi();
    </script>
